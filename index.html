<!DOCTYPE html>
<html>
<head>
  <base href="/smart_entry/">
  <meta charset="UTF-8">
  <title>smart_entry</title>

  <style>
    /* 1. මුලින්ම මුළු පිටුවම කළු කරනවා (White screen එක එන්න කලින්) */
    html, body {
      background-color: #000000 !important;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 2. අපේ DOS Loader එක CSS වලින්ම හදනවා */
    #initial-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px;
      z-index: 9999; /* හැමදේටම උඩින් තියෙන්න */
    }

    .dos-text {
      color: #54ff9f;
      font-family: 'Courier New', Courier, monospace;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .cursor {
      display: inline-block;
      width: 12px;
      height: 24px;
      background-color: #54ff9f;
      animation: blink 0.8s infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    /* Flutter එකේ Default Loader එක හංගන්න බලෙන් දාන Style එකක් */
    flutter-loader {
      display: none !important;
      visibility: hidden !important;
    }
  </style>
</head>
<body>
  <div id="initial-loader">
    <div class="dos-text">C:\> OrbitView Innovations</div>
    <div class="dos-text">System Booting...<span class="cursor"></span></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Flutter එක Load වෙලා App එක පටන් ගත්තම විතරක් Loader එක අයින් කරන Logic එක
    window.addEventListener('load', function(ev) {
      // මෙතන තත්පර 1ක වගේ පොඩි Delay එකක් දානවා ගැස්සීම නැති කරන්න
      setTimeout(function() {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.5s ease';
          setTimeout(function() { loader.remove(); }, 500);
        }
      }, 1500);
    });
  </script>
</body>
</html>
