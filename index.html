<!DOCTYPE html>
<html>
<head>
  <base href="/smart_entry/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <meta name="description" content="A new Flutter project.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="smart_entry">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>smart_entry</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #000000 !important; /* මුල්ම සුදු තිරය කළු කරයි */
      margin: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100vh;
    }
    
    /* අපේ DOS Loader එකේ පෙනුම */
    #initial-loader {
      color: #54ff9f; /* කොළ පාට අකුරු */
      font-family: monospace;
      font-size: 26px;
    }

    /* Flutter වල default එන නිල් පාට රවුම් ලෝඩර් එක හංගනවා */
    .flutter-loader {
      display: none !important; 
    }
  </style>
  </head>
<body>
  <div id="initial-loader">
    <div id="dos-text">C:\> OrbitView Innovations</div>
    <div id="dos-status">System Booting...</div>
    <div id="dos-cursor">_</div>
  </div>

  <style>
    /* මුලින්ම එන සුදු screen එක නැති කරන්න */
    html, body {
      background-color: #000000 !important;
      margin: 0;
      padding: 24px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    #initial-loader {
      color: #54ff9f;
      font-family: 'Courier New', Courier, monospace;
      font-size: 24px;
      line-height: 1.5;
    }

    #dos-cursor {
      display: inline-block;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
